"app/lessio/__init__.py" = ["RUF002"]                            # Russian in module docstring
"app/lessio/admin.py" = ["RUF001", "RUF002"]                     # Russian in admin error/comment strings
"app/lessio/models.py" = ["RUF001", "RUF002", "RUF003"]          # Russian in column docstrings + comments
"app/lessio/router.py" = ["RUF001", "RUF002", "RUF003"]          # Russian in user-facing error/success messages + comments
"app/lessio/service.py" = ["RUF001", "RUF002", "RUF003"]         # Russian in docstrings/comments/error messages
"app/lessio/web_router.py" = ["RUF001", "RUF002", "RUF003"]      # Russian in user-facing error messages + comments
