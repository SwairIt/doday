"app/experiments/presets.py" = ["RUF001", "RUF002"]  # preset titles/descriptions are Cyrillic user copy
"app/billing/products.py" = ["RUF001", "RUF002"]     # product titles/descriptions Cyrillic
"app/billing/stars.py" = ["RUF001", "RUF002"]        # error messages Cyrillic
"app/calendar_feed/service.py" = ["RUF001", "RUF002"]  # restored module — intentional Cyrillic in error/UI strings
