      - generic [ref=e25]:
        - paragraph [ref=e26]:
          - text: После регистрации Doday кладёт тебя на экран
          - strong [ref=e27]: Сегодня
          - text: . Если ничего не запланировано — это нормально. Один туду-лист — это просто пустой список, в который ты сейчас положишь первую вещь.
        - heading "1. Открой Inbox" [level=3] [ref=e28]
        - paragraph [ref=e29]:
          - text: Слева в сайдбаре — пункт
          - generic [ref=e30]: Inbox
          - text: . Это специальный «несортированный» проект. Любая задача без проекта попадает сюда. Идеален как «куча всего, чтобы потом разобрать».
        - heading "2. Добавь первую задачу" [level=3] [ref=e31]
        - paragraph [ref=e32]:
          - text: В шапке любого списка — большое поле быстрого ввода. Напечатай
          - emphasis [ref=e33]: «Купить молоко завтра»
          - text: и нажми Enter. Doday поймёт, что «завтра» — это срок, и поставит соответствующий дедлайн. Поле также понимает приоритет (
          - code [ref=e34]: "!"
          - text: —
          - code [ref=e35]: "!!!!"
          - text: ) и лейблы (
          - code [ref=e36]: "@дом"
          - text: ).
        - heading "3. Заверши её" [level=3] [ref=e37]
        - paragraph [ref=e38]: Кликни кружок слева от задачи. Анимация, эмодзи 🎉 если выполнишь дневную цель. Завершённое уезжает в раздел «Выполнено» внизу проекта (можно скрыть).
        - heading "4. Добавь свой первый проект" [level=3] [ref=e39]
        - paragraph [ref=e40]:
          - text: В сайдбаре кликни
          - generic [ref=e41]: +
          - text: рядом с заголовком «Проекты» или нажми
          - generic [ref=e42]: Shift+P
          - text: . Открывается модалка — назови проект, выбери цвет, или возьми готовый шаблон («Учёба», «Поездка», «Переезд» — всего 8 встроенных).
        - paragraph [ref=e43]: Дальше уже всё индивидуально. Загляни в остальные статьи слева.
