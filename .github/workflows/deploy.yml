name: Deploy to prod

# Запускается ПОСЛЕ успешного CI на master. Если CI красный — деплой не идёт.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

jobs:
  deploy:
    # Только если CI зелёный.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (для smoke-test)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: SSH redeploy на проде
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          port: 22
          timeout: 60s
          command_timeout: 120s
          # Те же шаги что в .tmp_ssh_inspect.py:
          # 1. git pull до origin/master
          # 2. clear pyc
          # 3. alembic upgrade head (если есть новые миграции)
          # 4. kill uvicorn на 8011
          # 5. start uvicorn заново
          # 6. local /health 200
          script: |
            set -eu
            cd /var/www/getdoday/data/www/getdoday.ru/app
            echo ">>> git pull"
            git fetch origin --quiet
            git reset --hard origin/master 2>&1 | tail -1
            git log -1 --oneline
            echo ">>> clear pyc"
            find . -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true
            echo ">>> alembic upgrade head"
            .venv/bin/python -m alembic upgrade head 2>&1 | tail -3
            echo ">>> kill uvicorn :8011"
            for pid in $(lsof -ti:8011 2>/dev/null); do kill -9 $pid; done
            sleep 1
            ss -tln | grep ':8011' && echo "STILL bound" || echo "CLEAN"
            echo ">>> start uvicorn"
            python3 /var/www/getdoday/data/start_uvicorn.py
            sleep 5
            echo ">>> local /health"
            curl -sS -m 5 http://127.0.0.1:8011/health
            echo ""

      - name: External smoke-test https://getdoday.ru
        run: |
          # 18 endpoint'ов через скрипт. Если что-то 500 — fail step.
          python3 -c "
          import sys, urllib.request, urllib.error
          checks = [
              ('/', 200), ('/privacy', 200), ('/pricing', 200),
              ('/help', 200), ('/help/articles.json', 200),
              ('/sitemap.xml', 200), ('/robots.txt', 200),
              ('/og.svg', 200), ('/favicon.ico', 200),
              ('/manifest.webmanifest', 200), ('/service-worker.js', 200),
              ('/health', 200),
              ('/auth/register', 200), ('/auth/login', 200),
              ('/app/today', 401), ('/app/inbox', 401),
              ('/app/calendar', 401), ('/app/profile', 401),
          ]
          fails = []
          for path, expected in checks:
              try:
                  req = urllib.request.Request('https://getdoday.ru' + path)
                  resp = urllib.request.urlopen(req, timeout=10)
                  code = resp.status
              except urllib.error.HTTPError as e:
                  code = e.code
              except Exception as e:
                  fails.append((path, expected, f'ERR: {e}'))
                  continue
              status = 'OK' if code == expected else 'FAIL'
              print(f'  {status:5}  {path:35}  {code} (expected {expected})')
              if code != expected:
                  fails.append((path, expected, code))
          if fails:
              print(f'!!! {len(fails)}/{len(checks)} checks failed')
              sys.exit(1)
          print(f'all {len(checks)} green')
          "
