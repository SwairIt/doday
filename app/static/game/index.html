<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0d0820">
  <meta name="robots" content="index,follow">
  <title>Кокос Воды — мем-игра от Doday</title>
  <meta name="description" content="Мем-кликер про кокос воды, sixsevenseven и стримеров. Сделано Doday — открой свой todo-лист после игры.">
  <meta property="og:title" content="Кокос Воды — мем-игра">
  <meta property="og:description" content="Кликай. Лови кокосы. Открой 67. Мем-игра от Doday.">
  <meta property="og:url" content="https://getdoday.ru/game">
  <meta property="og:image" content="https://getdoday.ru/og.svg">
  <meta property="og:type" content="website">
  <link rel="icon" href="/favicon.ico">

  <link rel="stylesheet" href="/static/game/styles.css">

  <!-- Three.js via CDN — no Node.js / npm install needed.
       importmap lets game.js use bare `import * from 'three'` syntax. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- HUD overlay — sits above the canvas, click-through except buttons. -->
  <div id="hud">
    <div id="top-bar">
      <a id="brand" href="/" title="Doday — free todo">
        <span class="brand-logo">D</span>
        <span class="brand-text">Doday Games</span>
      </a>
      <div id="score-block">
        <div class="score-label">Кокосов</div>
        <div id="score">0</div>
      </div>
    </div>

    <div id="hint" class="hint">Тапай по чуваку! Лови кокосы которые падают сверху!</div>

    <button id="share-btn" class="float-btn">
      <span>📤</span> Поделиться рекордом
    </button>

    <div id="footer">
      <a href="/">← На главную Doday</a>
      <span class="sep">·</span>
      <span class="hint-small">P.S. Серии 🔥 и помодоро 🍅 — это всё на Doday</span>
    </div>
  </div>

  <!-- Achievement popup — slides in from top-right when unlocked. -->
  <div id="ach-popup" class="ach-popup">
    <div class="ach-emoji" id="ach-emoji">🏆</div>
    <div class="ach-text">
      <div class="ach-title" id="ach-title">Новое достижение</div>
      <div class="ach-desc" id="ach-desc">Описание</div>
    </div>
  </div>

  <!-- "67" easter-egg fullscreen overlay — fires when score hits 67. -->
  <div id="mem-overlay" class="mem-overlay">
    <div class="mem-text">67</div>
    <div class="mem-sub">SIX SEVEN 🤘</div>
    <button id="mem-close" class="mem-close">Продолжить →</button>
  </div>

  <script type="module" src="/static/game/game.js"></script>
</body>
</html>
