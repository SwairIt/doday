{# Comments block under a task — list + add form. Self-replacing target. #}
<div id="comments-{{ task_id }}" class="mt-2 ml-9 mr-2 space-y-2 animate-fade-in">
  {% if comments %}
    <div class="space-y-1.5">
      {% for c in comments %}
        <div id="comment-{{ c.id }}" class="group bg-[var(--surface-2)] border border-[var(--border)] rounded-lg p-2.5 text-sm relative">
          <div class="flex items-start justify-between gap-2">
            <div class="whitespace-pre-wrap break-words flex-1 min-w-0">{{ c.body }}</div>
            <button type="button" title="Удалить"
                    class="opacity-0 group-hover:opacity-100 p-1 rounded hover:bg-rose-500/10 text-[var(--text-muted)] hover:text-rose-400 shrink-0 transition"
                    hx-delete="/htmx/comments/{{ c.id }}"
                    hx-target="#comment-{{ c.id }}"
                    hx-swap="outerHTML swap:160ms"
                    hx-confirm="Удалить комментарий?">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m14 0H5"/></svg>
            </button>
          </div>
          <div class="text-[10px] text-[var(--text-muted)] mt-1">{{ c.created_at.strftime('%d.%m %H:%M') }}</div>
        </div>
      {% endfor %}
    </div>
  {% endif %}

  <form
    hx-post="/htmx/tasks/{{ task_id }}/comments"
    hx-target="#comments-{{ task_id }}"
    hx-swap="outerHTML"
    class="flex items-start gap-2"
  >
    <textarea
      name="body"
      required
      rows="1"
      placeholder="Добавить комментарий…"
      class="flex-1 bg-[var(--surface-2)] border border-[var(--border)] rounded-lg px-3 py-1.5 text-sm focus:border-[var(--accent)] outline-none transition resize-none"
      onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();this.form.requestSubmit();}"
    ></textarea>
    <button type="submit" class="btn-primary px-3 py-1.5 text-sm shrink-0">Сохранить</button>
  </form>
</div>
