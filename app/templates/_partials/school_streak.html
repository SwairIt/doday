{# School-only streak chip — counts consecutive days with at least one completed
   task whose title mentions a known школьный предмет. Pulled from
   /api/stats/school-streak, lives near the morning briefing. #}
<section
  x-data="{
    s: null,
    async load() {
      try {
        const r = await fetch('/api/stats/school-streak', {credentials:'include'});
        if (r.ok) this.s = await r.json();
      } catch(e){}
    },
    daysWord(n) {
      const last = n % 10, last2 = n % 100;
      if (last === 1 && last2 !== 11) return 'день';
      if (last >= 2 && last <= 4 && (last2 < 10 || last2 >= 20)) return 'дня';
      return 'дней';
    },
  }"
  x-init="load()"
  x-show="s && s.current > 0"
  x-cloak
  class="card p-4 mb-6 border border-violet-500/20 bg-gradient-to-r from-violet-500/10 to-transparent"
>
  <div class="flex items-center gap-3">
    <div class="text-3xl shrink-0">📚</div>
    <div class="flex-1 min-w-0">
      <div class="text-xs text-[var(--text-muted)] uppercase tracking-wider font-semibold">Школьная серия</div>
      <div class="text-base font-semibold">
        <span class="grad-text" x-text="s ? s.current : 0"></span>
        <span x-text="s ? daysWord(s.current) : ''"></span> подряд с домашкой
      </div>
    </div>
    <div class="text-right text-xs text-[var(--text-muted)] shrink-0">
      <template x-if="s && !s.today_done">
        <div class="text-orange-400">сегодня ещё ничего</div>
      </template>
      <template x-if="s && s.today_done">
        <div class="text-emerald-400">✓ сегодня</div>
      </template>
      <div>рекорд: <span x-text="s ? s.longest : 0"></span></div>
    </div>
  </div>
</section>
