{# Floating bulk-action bar. Shown when Alpine store 'selection' has items. #}
<div
  x-data="{
    projects: [],
    loaded: false,
    async load() {
      if (this.loaded) return;
      this.loaded = true;
      try {
        const r = await fetch('/api/projects', {credentials: 'include'});
        if (r.ok) this.projects = await r.json();
      } catch (e) {}
    },
  }"
  x-cloak
  x-show="$store.selection.count() > 0"
  x-init="load()"
  x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="opacity-0 translate-y-4"
  x-transition:enter-end="opacity-100 translate-y-0"
  class="fixed bottom-20 md:bottom-6 left-1/2 -translate-x-1/2 z-40 card flex items-center gap-2 px-3 py-2 shadow-glow flex-wrap max-w-[95vw]"
>
  <span class="text-sm font-medium px-2">
    Выбрано: <span x-text="$store.selection.count()"></span>
  </span>
  <span class="w-px h-6 bg-[var(--border)]"></span>

  <form hx-post="/htmx/bulk" hx-include="this" hx-vals='js:{action: "complete"}' class="contents">
    <template x-for="id in $store.selection.ids" :key="id">
      <input type="hidden" name="ids" :value="id">
    </template>
    <button type="submit" class="btn-ghost px-3 py-1.5 text-sm gap-1.5" title="Завершить выбранные">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
      Завершить
    </button>
  </form>

  <div x-data="{ open: false }" class="relative">
    <button type="button" @click="open = !open"
            class="btn-ghost px-3 py-1.5 text-sm gap-1.5">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9"/></svg>
      Приоритет
    </button>
    <div x-show="open" x-cloak @click.outside="open = false" x-transition
         class="absolute bottom-full mb-2 left-0 card p-1 flex gap-1 shadow-lg z-30">
      {% for p, pc in [('p1','rose'),('p2','amber'),('p3','sky'),('p4','slate')] %}
        <form hx-post="/htmx/bulk" hx-include="this" hx-vals='js:{action: "set_priority", priority: "{{ p }}"}' class="contents">
          <template x-for="id in $store.selection.ids" :key="id">
            <input type="hidden" name="ids" :value="id">
          </template>
          <button type="submit" @click="open = false"
                  class="w-9 h-9 rounded text-xs font-bold bg-{{ pc }}-500/15 text-{{ pc }}-400 hover:bg-{{ pc }}-500/30 transition" title="Установить !{{ p[1:] }}">!{{ p[1:] }}</button>
        </form>
      {% endfor %}
    </div>
  </div>

  <div x-data="{ open: false }" class="relative">
    <button type="button" @click="open = !open"
            class="btn-ghost px-3 py-1.5 text-sm gap-1.5">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      В проект
    </button>
    <div x-show="open" x-cloak @click.outside="open = false" x-transition
         class="absolute bottom-full mb-2 left-0 card p-1 w-56 max-h-64 overflow-y-auto shadow-lg z-30 space-y-0.5">
      <template x-for="proj in projects" :key="proj.id">
        <form hx-post="/htmx/bulk" hx-include="this" :hx-vals="JSON.stringify({action: 'move_project', project_id: proj.id})" class="contents">
          <template x-for="id in $store.selection.ids" :key="id">
            <input type="hidden" name="ids" :value="id">
          </template>
          <button type="submit" @click="open = false"
                  class="w-full text-left text-sm px-3 py-1.5 rounded hover:bg-[var(--surface-2)] flex items-center gap-2 transition">
            <span class="w-2 h-2 rounded-full shrink-0" :class="'bg-' + proj.color + '-500'"></span>
            <span class="truncate" x-text="proj.name"></span>
          </button>
        </form>
      </template>
    </div>
  </div>

  <form hx-post="/htmx/bulk" hx-include="this" hx-vals='js:{action: "delete"}' hx-confirm="Удалить выбранные задачи? Это нельзя отменить." class="contents">
    <template x-for="id in $store.selection.ids" :key="id">
      <input type="hidden" name="ids" :value="id">
    </template>
    <button type="submit" class="px-3 py-1.5 text-sm rounded-xl bg-rose-500/15 text-rose-400 border border-rose-500/40 hover:bg-rose-500/25 transition font-medium inline-flex items-center gap-1.5">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m14 0H5"/></svg>
      Удалить
    </button>
  </form>

  <span class="w-px h-6 bg-[var(--border)]"></span>
  <button type="button" @click="$store.selection.clear()"
          class="text-sm text-[var(--text-muted)] hover:text-[var(--text)] px-2"
          title="Снять выделение (Esc)">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
  </button>
</div>
