{# Floating bulk-action bar. Shown when Alpine store 'selection' has items. #}
<div
  x-data="{
    projects: [],
    labels: [],
    loaded: false,
    async load() {
      if (this.loaded) return;
      this.loaded = true;
      try {
        const [pr, lr] = await Promise.all([
          fetch('/api/projects', {credentials: 'include'}),
          fetch('/api/labels', {credentials: 'include'}),
        ]);
        if (pr.ok) this.projects = await pr.json();
        if (lr.ok) this.labels = await lr.json();
      } catch (e) {}
    },
    copySelected() {
      const ids = this.$store.selection.ids;
      const lines = ids.map(id => {
        const el = document.getElementById('task-wrap-' + id) || document.getElementById('kcard-' + id);
        const title = el ? (el.dataset.titleText || '') : '';
        return title ? ('- [ ] ' + title) : '';
      }).filter(l => l);
      const text = lines.join('\n');
      if (text && navigator.clipboard) navigator.clipboard.writeText(text);
      return !!text;
    },
  }"
  x-cloak
  x-show="$store.selection.count() > 0"
  x-init="load()"
  x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="opacity-0 translate-y-4"
  x-transition:enter-end="opacity-100 translate-y-0"
  class="fixed bottom-20 md:bottom-6 left-1/2 -translate-x-1/2 z-40 card flex items-center gap-2 px-3 py-2 shadow-glow flex-wrap max-w-[95vw]"
>
  <span class="text-sm font-medium px-2">
    Выбрано: <span x-text="$store.selection.count()"></span>
  </span>
  <span class="w-px h-6 bg-[var(--border)]"></span>

  <form hx-post="/htmx/bulk" hx-include="this" hx-vals='js:{action: "complete"}' class="contents">
    <template x-for="id in $store.selection.ids" :key="id">
      <input type="hidden" name="ids" :value="id">
    </template>
    <button type="submit" class="btn-ghost px-3 py-1.5 text-sm gap-1.5" title="Завершить выбранные">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
      Завершить
    </button>
  </form>

  <form hx-post="/htmx/bulk" hx-include="this" hx-vals='js:{action: "uncomplete"}' class="contents">
    <template x-for="id in $store.selection.ids" :key="id">
      <input type="hidden" name="ids" :value="id">
    </template>
    <button type="submit" class="btn-ghost px-3 py-1.5 text-sm gap-1.5" title="Вернуть выбранные в работу">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      Вернуть
    </button>
  </form>

  <form hx-post="/htmx/bulk" hx-include="this" hx-vals='js:{action: "duplicate"}' class="contents">
    <template x-for="id in $store.selection.ids" :key="id">
      <input type="hidden" name="ids" :value="id">
    </template>
    <button type="submit" class="btn-ghost px-3 py-1.5 text-sm gap-1.5" title="Дублировать выбранные">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"/></svg>
      Дублировать
    </button>
  </form>

  <form hx-post="/htmx/bulk" hx-include="this" hx-vals='js:{action: "assign_me"}' class="contents">
    <template x-for="id in $store.selection.ids" :key="id">
      <input type="hidden" name="ids" :value="id">
    </template>
    <button type="submit" class="btn-ghost px-3 py-1.5 text-sm gap-1.5" title="Назначить выбранные на меня">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      На меня
    </button>
  </form>

  <form hx-post="/htmx/bulk" hx-include="this" hx-vals='js:{action: "unassign"}' class="contents">
    <template x-for="id in $store.selection.ids" :key="id">
      <input type="hidden" name="ids" :value="id">
    </template>
    <button type="submit" class="btn-ghost px-3 py-1.5 text-sm gap-1.5" title="Снять назначение с выбранных">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7zM3 3l18 18"/></svg>
      Снять
    </button>
  </form>

  <div x-data="{
         open: false,
         members: [],
         mixed: false,
         me: '{{ current_user.id }}',
         async refresh() {
           const ids = $store.selection.ids;
           let pid = null, mixed = false;
           for (const id of ids) {
             const el = document.getElementById('task-wrap-' + id);
             const p = el ? (el.dataset.project || '') : '';
             if (!p) { mixed = true; break; }
             if (pid === null) pid = p; else if (pid !== p) { mixed = true; break; }
           }
           this.mixed = mixed || !pid;
           this.members = [];
           if (!this.mixed) {
             try {
               const r = await fetch('/api/projects/' + pid + '/members', {credentials: 'include'});
               if (r.ok) this.members = await r.json();
             } catch (e) {}
           }
         },
         toggle() { this.open = !this.open; if (this.open) this.refresh(); },
         assign(uid) {
           const f = new FormData();
           f.append('action', 'assign_user');
           f.append('assignee_id', uid);
           $store.selection.ids.forEach(id => f.append('ids', id));
           fetch('/htmx/bulk', {method: 'POST', credentials: 'include', body: f}).then(() => location.reload());
           this.open = false;
         },
       }" class="relative">
    <button type="button" @click="toggle()" class="btn-ghost px-3 py-1.5 text-sm gap-1.5" title="Назначить выбранные на участника">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-3a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
      Назначить
    </button>
    <div x-show="open" x-cloak @click.outside="open = false" x-transition
         class="absolute bottom-full mb-2 left-0 card p-1 w-56 max-h-64 overflow-y-auto shadow-lg z-30 space-y-0.5">
      <template x-if="mixed">
        <div class="text-xs text-[var(--text-muted)] italic px-3 py-2">Выберите задачи одного проекта</div>
      </template>
      <template x-if="!mixed && members.length <= 1">
        <div class="text-xs text-[var(--text-muted)] italic px-3 py-2">В проекте только вы</div>
      </template>
      <template x-if="!mixed && members.length > 1">
        <div>
          <template x-for="m in members" :key="m.user_id">
            <button type="button" @click="assign(m.user_id)"
                    class="w-full text-left text-sm px-3 py-1.5 rounded hover:bg-[var(--surface-2)] truncate transition"
                    x-text="m.email + (m.user_id === me ? ' (вы)' : '')"></button>
          </template>
        </div>
      </template>
    </div>
  </div>

  <div x-data="{ open: false }" class="relative">
    <button type="button" @click="open = !open"
            class="btn-ghost px-3 py-1.5 text-sm gap-1.5">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9"/></svg>
      Приоритет
    </button>
    <div x-show="open" x-cloak @click.outside="open = false" x-transition
         class="absolute bottom-full mb-2 left-0 card p-1 flex gap-1 shadow-lg z-30">
      {% for p, pc in [('p1','rose'),('p2','amber'),('p3','sky'),('p4','slate')] %}
        <form hx-post="/htmx/bulk" hx-include="this" hx-vals='js:{action: "set_priority", priority: "{{ p }}"}' class="contents">
          <template x-for="id in $store.selection.ids" :key="id">
            <input type="hidden" name="ids" :value="id">
          </template>
          <button type="submit" @click="open = false"
                  class="w-9 h-9 rounded text-xs font-bold bg-{{ pc }}-500/15 text-{{ pc }}-400 hover:bg-{{ pc }}-500/30 transition" title="Установить !{{ p[1:] }}">!{{ p[1:] }}</button>
        </form>
      {% endfor %}
    </div>
  </div>

  <div x-data="{ open: false }" class="relative">
    <button type="button" @click="open = !open"
            class="btn-ghost px-3 py-1.5 text-sm gap-1.5">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      В проект
    </button>
    <div x-show="open" x-cloak @click.outside="open = false" x-transition
         class="absolute bottom-full mb-2 left-0 card p-1 w-56 max-h-64 overflow-y-auto shadow-lg z-30 space-y-0.5">
      <template x-for="proj in projects" :key="proj.id">
        <form hx-post="/htmx/bulk" hx-include="this" :hx-vals="JSON.stringify({action: 'move_project', project_id: proj.id})" class="contents">
          <template x-for="id in $store.selection.ids" :key="id">
            <input type="hidden" name="ids" :value="id">
          </template>
          <button type="submit" @click="open = false"
                  class="w-full text-left text-sm px-3 py-1.5 rounded hover:bg-[var(--surface-2)] flex items-center gap-2 transition">
            <span class="w-2 h-2 rounded-full shrink-0" :class="'bg-' + proj.color + '-500'"></span>
            <span class="truncate" x-text="proj.name"></span>
          </button>
        </form>
      </template>
    </div>
  </div>

  <div x-data="{
         open: false,
         sections: [],
         mixed: false,
         async refresh() {
           const ids = $store.selection.ids;
           let pid = null, mixed = false;
           for (const id of ids) {
             const el = document.getElementById('task-wrap-' + id);
             const p = el ? (el.dataset.project || '') : '';
             if (!p) { mixed = true; break; }
             if (pid === null) pid = p; else if (pid !== p) { mixed = true; break; }
           }
           this.mixed = mixed || !pid;
           this.sections = [];
           if (!this.mixed) {
             try {
               const r = await fetch('/api/sections?project_id=' + pid, {credentials: 'include'});
               if (r.ok) this.sections = await r.json();
             } catch (e) {}
           }
         },
         toggle() { this.open = !this.open; if (this.open) this.refresh(); },
       }" class="relative">
    <button type="button" @click="toggle()" class="btn-ghost px-3 py-1.5 text-sm gap-1.5">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h7"/></svg>
      Секция
    </button>
    <div x-show="open" x-cloak @click.outside="open = false" x-transition
         class="absolute bottom-full mb-2 left-0 card p-1 w-56 max-h-64 overflow-y-auto shadow-lg z-30 space-y-0.5">
      <template x-if="mixed">
        <div class="text-xs text-[var(--text-muted)] italic px-3 py-2">Выберите задачи одного проекта</div>
      </template>
      <template x-if="!mixed">
        <div>
          <button type="button"
                  @click="
                    const f = new FormData();
                    f.append('action', 'set_section');
                    f.append('section_id', '');
                    $store.selection.ids.forEach(id => f.append('ids', id));
                    fetch('/htmx/bulk', {method: 'POST', credentials: 'include', body: f}).then(() => location.reload());
                    open = false;
                  "
                  class="w-full text-left text-sm px-3 py-1.5 rounded hover:bg-[var(--surface-2)] text-[var(--text-muted)] transition">— Без секции</button>
          <template x-for="sec in sections" :key="sec.id">
            <button type="button"
                    @click="
                      const f = new FormData();
                      f.append('action', 'set_section');
                      f.append('section_id', sec.id);
                      $store.selection.ids.forEach(id => f.append('ids', id));
                      fetch('/htmx/bulk', {method: 'POST', credentials: 'include', body: f}).then(() => location.reload());
                      open = false;
                    "
                    class="w-full text-left text-sm px-3 py-1.5 rounded hover:bg-[var(--surface-2)] truncate transition" x-text="sec.name"></button>
          </template>
          <template x-if="sections.length === 0">
            <div class="text-xs text-[var(--text-muted)] italic px-3 py-2">В проекте нет секций</div>
          </template>
        </div>
      </template>
    </div>
  </div>

  <div x-data="{
         open: false,
         today: new Date().toISOString().slice(0,10),
         tomorrow: new Date(Date.now()+86400000).toISOString().slice(0,10),
         nextweek: new Date(Date.now()+7*86400000).toISOString().slice(0,10),
       }" class="relative">
    <button type="button" @click="open = !open"
            class="btn-ghost px-3 py-1.5 text-sm gap-1.5">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3M3 11h18M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      Дата
    </button>
    <div x-show="open" x-cloak @click.outside="open = false" x-transition
         class="absolute bottom-full mb-2 left-0 card p-2 w-56 shadow-lg z-30 space-y-1">
      <template x-for="opt in [
                  {label: '📅 Сегодня', val: today},
                  {label: '🌅 Завтра', val: tomorrow},
                  {label: '📆 Через 7 дней', val: nextweek},
                  {label: '🚫 Без срока', val: ''}
                ]" :key="opt.label">
        <form hx-post="/htmx/bulk" hx-include="this" :hx-vals="JSON.stringify({action: 'set_due', due: opt.val})" class="contents">
          <template x-for="id in $store.selection.ids" :key="id">
            <input type="hidden" name="ids" :value="id">
          </template>
          <button type="submit" @click="open = false"
                  class="w-full text-left text-xs px-2 py-1.5 rounded hover:bg-[var(--surface-2)] transition" x-text="opt.label"></button>
        </form>
      </template>
      <div class="border-t border-[var(--border)] pt-2 mt-1">
        <input type="date"
               class="w-full bg-[var(--surface-2)] border border-[var(--border)] rounded px-2 py-1 text-xs"
               @change="
                 const v = $event.target.value;
                 if (!v) return;
                 const f = new FormData();
                 f.append('action', 'set_due');
                 f.append('due', v);
                 $store.selection.ids.forEach(id => f.append('ids', id));
                 fetch('/htmx/bulk', {method:'POST', credentials:'include', body: f}).then(()=>location.reload());
                 open = false;
               ">
      </div>
    </div>
  </div>

  <div x-data="{ open: false }" class="relative">
    <button type="button" @click="open = !open"
            class="btn-ghost px-3 py-1.5 text-sm gap-1.5">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
      Лейбл
    </button>
    <div x-show="open" x-cloak @click.outside="open = false" x-transition
         class="absolute bottom-full mb-2 left-0 card p-1 w-56 max-h-64 overflow-y-auto shadow-lg z-30 space-y-0.5">
      <template x-for="lab in labels" :key="lab.id">
        <form hx-post="/htmx/bulk" hx-include="this" :hx-vals="JSON.stringify({action: 'attach_label', label_id: lab.id})" class="contents">
          <template x-for="id in $store.selection.ids" :key="id">
            <input type="hidden" name="ids" :value="id">
          </template>
          <button type="submit" @click="open = false"
                  class="w-full text-left text-sm px-3 py-1.5 rounded hover:bg-[var(--surface-2)] flex items-center gap-2 transition">
            <span class="w-2 h-2 rounded-full shrink-0" :class="'bg-' + lab.color + '-500'"></span>
            <span class="truncate" x-text="'@' + lab.name"></span>
          </button>
        </form>
      </template>
      <div x-show="!labels.length" class="text-xs text-[var(--text-muted)] italic px-3 py-2">Лейблов нет — создай на /app/labels</div>
    </div>
  </div>

  <form hx-post="/htmx/bulk" hx-include="this" hx-vals='js:{action: "delete"}' hx-confirm="Удалить выбранные задачи? Это нельзя отменить." class="contents">
    <template x-for="id in $store.selection.ids" :key="id">
      <input type="hidden" name="ids" :value="id">
    </template>
    <button type="submit" class="px-3 py-1.5 text-sm rounded-xl bg-rose-500/15 text-rose-400 border border-rose-500/40 hover:bg-rose-500/25 transition font-medium inline-flex items-center gap-1.5">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m14 0H5"/></svg>
      Удалить
    </button>
  </form>

  <span class="w-px h-6 bg-[var(--border)]"></span>
  <button type="button" x-data="{ copied: false }"
          @click="if (copySelected()) { copied = true; setTimeout(() => copied = false, 1500); }"
          class="text-sm text-[var(--text-muted)] hover:text-[var(--text)] px-2"
          :title="copied ? 'Скопировано ✓' : 'Скопировать выделенные как список'">
    <svg x-show="!copied" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
    <svg x-show="copied" x-cloak class="w-4 h-4 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
  </button>
  <button type="button" @click="$store.selection.selectAll()"
          class="text-sm text-[var(--text-muted)] hover:text-[var(--text)] px-2"
          title="Выделить все видимые (Ctrl+A)">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
  </button>
  <button type="button" @click="$store.selection.clear()"
          class="text-sm text-[var(--text-muted)] hover:text-[var(--text)] px-2"
          title="Снять выделение (Esc)">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
  </button>
</div>
