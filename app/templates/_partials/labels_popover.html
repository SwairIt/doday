{# Label-picker popover for a task. Lists all user labels with toggleable rows + create-new input. #}
<div class="card p-2 w-60 shadow-lg space-y-0.5 max-h-72 overflow-y-auto">
  {% if labels %}
    {% for lab in labels %}
      {% set is_attached = lab.id in attached_ids %}
      <button
        type="button"
        class="w-full text-left text-sm px-2 py-1.5 rounded hover:bg-[var(--surface-2)] transition flex items-center gap-2"
        hx-post="/doday/htmx/tasks/{{ task_id }}/labels/{{ lab.id }}/toggle"
        hx-target="#task-{{ task_id }}"
        hx-swap="outerHTML"
      >
        <span class="w-3 h-3 rounded-sm bg-{{ lab.color }}-500 shrink-0"></span>
        <span class="flex-1 truncate">@{{ lab.name }}</span>
        {% if is_attached %}
          <svg class="w-3.5 h-3.5 text-emerald-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        {% endif %}
      </button>
    {% endfor %}
  {% else %}
    <div class="text-xs text-[var(--text-muted)] italic px-2 py-1">Лейблов пока нет.</div>
  {% endif %}
  <div class="border-t border-[var(--border)] pt-2 mt-2">
    <form
      hx-post="/doday/htmx/tasks/{{ task_id }}/labels/new"
      hx-target="#task-{{ task_id }}"
      hx-swap="outerHTML"
      class="flex items-center gap-1"
    >
      <input
        type="text"
        name="name"
        required
        maxlength="40"
        placeholder="Новый лейбл…"
        class="flex-1 bg-[var(--surface-2)] border border-[var(--border)] rounded px-2 py-1 text-xs outline-none focus:border-[var(--accent)] transition"
      >
      <button type="submit" class="btn-primary px-2 py-1 text-xs">+</button>
    </form>
  </div>
</div>
