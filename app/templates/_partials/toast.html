{# Reusable transient toast singleton. Call `window.dodayToast(message, opts)`
   from anywhere; opts = {icon?: string, duration?: ms (default 2500)}.
   Decoupled from undo_toast (which is delete-specific). #}
<div
  x-data="{
    show: false,
    message: '',
    icon: '',
    timer: null,
    init() {
      window.dodayToast = (message, opts) => {
        opts = opts || {};
        this.message = message || '';
        this.icon = opts.icon || '';
        this.show = true;
        if (this.timer) clearTimeout(this.timer);
        this.timer = setTimeout(() => { this.show = false; }, opts.duration || 2500);
      };
    },
  }"
  x-show="show"
  x-cloak
  x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="opacity-0 translate-y-4"
  x-transition:enter-end="opacity-100 translate-y-0"
  x-transition:leave="transition ease-in duration-150"
  x-transition:leave-start="opacity-100"
  x-transition:leave-end="opacity-0"
  class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50 card px-4 py-2.5 shadow-glow border border-[var(--border)] flex items-center gap-2 text-sm"
  role="status"
  aria-live="polite"
>
  <span x-show="icon" x-text="icon"></span>
  <span class="text-[var(--text)] font-medium" x-text="message"></span>
</div>
