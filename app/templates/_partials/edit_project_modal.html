{# Modal: edit project name / color / description. Triggered by `open-edit-project` event. #}
<div
  x-data="{
    open: false,
    id: '',
    name: '',
    color: 'violet',
    description: '',
    saving: false,
    async save() {
      if (!this.name.trim()) return;
      this.saving = true;
      const r = await fetch('/api/projects/' + this.id, {
        method: 'PATCH', credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: this.name.trim(), color: this.color, description: this.description}),
      });
      this.saving = false;
      if (r.ok) {
        const p = await r.json();
        window.location.href = '/doday/app/projects/' + p.slug;
      }
    },
  }"
  @open-edit-project.window="open = true; id = $event.detail.id; name = $event.detail.name; color = $event.detail.color; description = $event.detail.description || ''"
  x-show="open"
  x-cloak
  x-transition.opacity
  class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
  @click.self="open = false"
  @keydown.escape.window="open = false"
>
  <div x-show="open" x-transition.scale.origin.center.duration.200ms
       class="card w-full max-w-md shadow-glow">
    <div class="px-6 py-4 border-b border-[var(--border)] flex items-center justify-between">
      <h2 class="text-xl font-bold">Изменить проект</h2>
      <button type="button" @click="open = false" class="p-1 rounded hover:bg-[var(--surface-2)] text-[var(--text-muted)]">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="p-6 space-y-4">
      <div>
        <label class="block text-xs font-semibold text-[var(--text-muted)] mb-1.5">Название</label>
        <input type="text" x-model="name" @keydown.enter="save()"
               class="w-full px-4 py-2.5 rounded-lg bg-[var(--surface-2)] border border-[var(--border)] focus:border-[var(--accent)] outline-none transition">
      </div>
      <div>
        <label class="block text-xs font-semibold text-[var(--text-muted)] mb-1.5">Описание</label>
        <textarea x-model="description" rows="2"
                  placeholder="О чём этот проект?"
                  class="w-full px-4 py-2.5 rounded-lg bg-[var(--surface-2)] border border-[var(--border)] focus:border-[var(--accent)] outline-none transition resize-none"></textarea>
      </div>
      <div>
        <label class="block text-xs font-semibold text-[var(--text-muted)] mb-1.5">Цвет</label>
        <div class="flex flex-wrap gap-2">
          {% for c in ['violet', 'fuchsia', 'rose', 'amber', 'emerald', 'sky', 'indigo', 'cyan', 'slate'] %}
            <button type="button" @click="color = '{{ c }}'"
                    :class="color === '{{ c }}' ? 'ring-2 ring-offset-2 ring-offset-[var(--surface)] ring-{{ c }}-400' : ''"
                    class="w-8 h-8 rounded-lg bg-{{ c }}-500 transition hover:scale-110"></button>
          {% endfor %}
        </div>
      </div>
    </div>
    <div class="px-6 py-4 border-t border-[var(--border)] flex items-center justify-end gap-2">
      <button type="button" @click="open = false" class="px-4 py-2 rounded-lg hover:bg-[var(--surface-2)] transition text-sm">Отмена</button>
      <button type="button" @click="save()" :disabled="saving || !name.trim()"
              :class="saving || !name.trim() ? 'opacity-50 cursor-not-allowed' : ''"
              class="btn-primary px-5 py-2 text-sm">Сохранить</button>
    </div>
  </div>
</div>
