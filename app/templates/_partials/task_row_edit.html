{# Inline edit form for a task row. Replaces the read-only row. #}
<form
  id="task-{{ task.id }}"
  hx-patch="/htmx/tasks/{{ task.id }}"
  hx-target="this"
  hx-swap="outerHTML"
  class="task-row flex items-center gap-3 p-3 rounded-xl border-2 border-[var(--accent)] bg-[var(--surface)] shadow-glow"
>
  <input
    type="text"
    name="title"
    value="{{ task.title }}"
    class="flex-1 bg-transparent border-none outline-none text-base font-medium"
    autofocus
    required
    onkeydown="if (event.key === 'Escape') { htmx.ajax('GET', '/htmx/tasks/{{ task.id }}/row', { target: '#task-{{ task.id }}', swap: 'outerHTML' }); }"
  >
  <button type="submit" class="btn-primary px-3 py-1.5 text-sm">Сохранить</button>
  <button
    type="button"
    class="btn-ghost px-3 py-1.5 text-sm"
    hx-get="/htmx/tasks/{{ task.id }}/row"
    hx-target="#task-{{ task.id }}"
    hx-swap="outerHTML"
  >Отмена</button>
</form>
