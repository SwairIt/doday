{# Mood widget for personal-audience users on /today.
   1-tap selector (1..5 emoji), optional note, persisted via /api/mood.
   Compact view shows last-30-day strip when score for today is set. #}
<section
  x-data="{
    today: null,
    history: [],
    note: '',
    saving: false,
    emojis: ['😞','😕','😐','🙂','😄'],
    init() { this.load(); },
    async load() {
      try {
        const r = await fetch('/api/mood/today', {credentials:'include'});
        if (r.ok) {
          const d = await r.json();
          if (d.recorded) { this.today = d; this.note = d.note || ''; }
        }
        const h = await fetch('/api/mood/history?days=30', {credentials:'include'});
        if (h.ok) this.history = await h.json();
      } catch(e){}
    },
    async pick(score) {
      this.saving = true;
      const fd = new FormData();
      fd.append('score', score);
      if (this.note) fd.append('note', this.note);
      try {
        const r = await fetch('/api/mood/today', {method:'POST', body: fd, credentials:'include'});
        if (r.ok) { this.today = await r.json(); await this.load(); }
      } finally { this.saving = false; }
    },
    async saveNote() {
      if (!this.today) return;
      const fd = new FormData();
      fd.append('score', this.today.score);
      fd.append('note', this.note);
      try {
        await fetch('/api/mood/today', {method:'POST', body: fd, credentials:'include'});
      } catch(e){}
    },
    color(score) {
      return ['#ef4444','#f97316','#eab308','#10b981','#22c55e'][score-1] || 'transparent';
    },
  }"
  class="card p-5 mb-6"
>
  <div class="flex items-start gap-3 mb-3">
    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-pink-500 to-rose-400 flex items-center justify-center text-lg shrink-0">🌱</div>
    <div class="flex-1 min-w-0">
      <div class="text-xs text-[var(--text-muted)] uppercase tracking-wider font-semibold">Настроение дня</div>
      <div class="font-semibold text-sm">
        <template x-if="today"><span>Сохранено · можешь сменить в любой момент</span></template>
        <template x-if="!today"><span>Как ты сейчас?</span></template>
      </div>
    </div>
  </div>

  <div class="flex items-center gap-2 mb-3">
    <template x-for="(e, i) in emojis" :key="i">
      <button @click="pick(i+1)" :disabled="saving"
              :class="today && today.score === (i+1) ? 'ring-2 ring-[var(--accent)] bg-[var(--accent)]/10' : 'bg-[var(--surface-2)] border border-[var(--border)]'"
              class="flex-1 h-12 rounded-xl text-2xl transition active:scale-95 hover:border-[var(--accent)]"
              x-text="e"></button>
    </template>
  </div>

  <template x-if="today">
    <div>
      <input x-model="note" @blur="saveNote()" type="text" maxlength="200"
             placeholder="Короткая заметка (необязательно)"
             class="w-full px-3 py-2 text-xs rounded-lg bg-[var(--surface-2)] border border-[var(--border)] outline-none focus:border-[var(--accent)]">
    </div>
  </template>

  <template x-if="history.length > 1">
    <div class="mt-3 pt-3 border-t border-[var(--border)]">
      <div class="text-[10px] uppercase tracking-wider text-[var(--text-muted)] mb-1.5 font-semibold">Последние 30 дней</div>
      <div class="flex items-end gap-0.5 h-6">
        <template x-for="d in 30" :key="d">
          {# Walk newest-left → 0-day-ago to 29-days-ago. #}
          <template x-for="entry in [history.find(h => {
            const target = new Date();
            target.setDate(target.getDate() - (d-1));
            return h.mood_date === target.toISOString().slice(0,10);
          }) || null]">
            <span :style="entry ? `background:${color(entry.score)}` : ''"
                  :class="entry ? '' : 'bg-[var(--surface-2)]'"
                  class="flex-1 h-full rounded-sm"
                  :title="entry ? entry.mood_date + ': ' + emojis[entry.score-1] + (entry.note ? ' — '+entry.note : '') : ''"></span>
          </template>
        </template>
      </div>
    </div>
  </template>
</section>
