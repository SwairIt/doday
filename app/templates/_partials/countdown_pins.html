{# Pinned countdown cards on /today. Up to 3 at once, each with a label and a
   target date. Stored in localStorage so we don't need a backend table. #}
<section
  x-data="{
    pins: [],
    open: false,
    draftLabel: '',
    draftDate: '',
    init() { this.load(); },
    load() {
      try { this.pins = JSON.parse(localStorage.getItem('doday-countdowns') || '[]'); }
      catch(e) { this.pins = []; }
    },
    persist() {
      try { localStorage.setItem('doday-countdowns', JSON.stringify(this.pins)); } catch(e){}
    },
    daysUntil(dateStr) {
      const target = new Date(dateStr + 'T23:59:59');
      const now = new Date();
      const ms = target.getTime() - now.getTime();
      return Math.ceil(ms / (1000 * 60 * 60 * 24));
    },
    label(d) {
      if (d < 0) return Math.abs(d) + ' дн. назад';
      if (d === 0) return 'Сегодня!';
      if (d === 1) return 'Завтра';
      const last = d % 10, last2 = d % 100;
      if (last === 1 && last2 !== 11) return d + ' день';
      if (last >= 2 && last <= 4 && (last2 < 10 || last2 >= 20)) return d + ' дня';
      return d + ' дней';
    },
    color(d) {
      if (d < 0) return 'border-rose-500/40 bg-rose-500/5';
      if (d <= 1) return 'border-orange-500/40 bg-orange-500/5';
      if (d <= 7) return 'border-amber-500/40 bg-amber-500/5';
      return 'border-emerald-500/30 bg-emerald-500/5';
    },
    add() {
      if (!this.draftLabel.trim() || !this.draftDate) return;
      if (this.pins.length >= 3) return;
      this.pins.push({ id: Date.now(), label: this.draftLabel.trim().slice(0, 60), date: this.draftDate });
      this.draftLabel = ''; this.draftDate = '';
      this.persist();
    },
    remove(id) {
      this.pins = this.pins.filter(p => p.id !== id);
      this.persist();
    },
  }"
  class="mb-6"
>
  <template x-if="pins.length">
    <div class="grid sm:grid-cols-2 md:grid-cols-3 gap-2 mb-2">
      <template x-for="p in pins" :key="p.id">
        <div class="card p-3 border" :class="color(daysUntil(p.date))">
          <div class="flex items-start justify-between gap-2">
            <div class="min-w-0">
              <div class="text-xs text-[var(--text-muted)] uppercase tracking-wider font-semibold truncate" x-text="p.label"></div>
              <div class="text-2xl font-bold mt-0.5" x-text="label(daysUntil(p.date))"></div>
              <div class="text-[10px] text-[var(--text-muted)] mt-0.5"
                   x-text="new Date(p.date+'T00:00:00').toLocaleDateString('ru-RU', {day:'numeric',month:'long',year:'numeric'})"></div>
            </div>
            <button @click="remove(p.id)"
                    class="text-[var(--text-muted)] hover:text-rose-400 text-xs"
                    title="Открепить">×</button>
          </div>
        </div>
      </template>
    </div>
  </template>

  <button @click="open = !open"
          class="text-xs text-[var(--text-muted)] hover:text-[var(--accent)] inline-flex items-center gap-1.5">
    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h6l5 5v11a2 2 0 01-2 2H7a2 2 0 01-2-2V5z M13 3v6h6"/></svg>
    <span x-text="pins.length ? 'Закрепить ещё (' + (3 - pins.length) + ' свободно)' : 'Закрепить дату — экзамен, дедлайн, день рождения'"></span>
  </button>

  <div x-show="open" x-cloak x-transition class="mt-2 card p-3 flex flex-wrap items-end gap-2">
    <div class="flex-1 min-w-[160px]">
      <label class="block text-[10px] text-[var(--text-muted)] mb-1">Что считаем</label>
      <input x-model="draftLabel" type="text" maxlength="60" placeholder="ЕГЭ по математике"
             class="w-full px-3 py-1.5 text-sm rounded-lg bg-[var(--surface-2)] border border-[var(--border)] outline-none focus:border-[var(--accent)]">
    </div>
    <div>
      <label class="block text-[10px] text-[var(--text-muted)] mb-1">Дата</label>
      <input x-model="draftDate" type="date"
             class="px-3 py-1.5 text-sm rounded-lg bg-[var(--surface-2)] border border-[var(--border)] outline-none focus:border-[var(--accent)]">
    </div>
    <button @click="add()" :disabled="!draftLabel.trim() || !draftDate || pins.length >= 3"
            class="btn-primary px-3 py-1.5 text-sm">Закрепить</button>
  </div>
</section>
