{# Modal: blank project OR pick a template (built-in or user-saved). Triggered by `open-new-project`. #}
<div
  x-data="{
    open: false,
    mode: 'blank',
    name: '',
    color: 'violet',
    templates: [],
    userTemplates: [],
    loading: false,
    selectedKey: null,
    selectedUserId: null,
    async load() {
      try {
        const [tr, ur] = await Promise.all([
          fetch('/api/projects/templates', {credentials: 'include'}),
          fetch('/api/user-templates', {credentials: 'include'}),
        ]);
        if (tr.ok) this.templates = await tr.json();
        if (ur.ok) this.userTemplates = await ur.json();
      } catch (e) {}
    },
    async createBlank() {
      if (!this.name.trim()) return;
      this.loading = true;
      const r = await fetch('/api/projects', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: this.name.trim(), color: this.color}),
      });
      if (r.ok) {
        const p = await r.json();
        window.location.href = '/doday/app/projects/' + p.slug;
      } else {
        this.loading = false;
      }
    },
    async createFromTemplate() {
      this.loading = true;
      let r;
      if (this.selectedUserId) {
        r = await fetch('/api/user-templates/' + this.selectedUserId + '/instantiate', {
          method: 'POST', credentials: 'include',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({name: this.name.trim() || null}),
        });
      } else if (this.selectedKey) {
        r = await fetch('/api/projects/from-template', {
          method: 'POST', credentials: 'include',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({template_key: this.selectedKey, name: this.name.trim() || null}),
        });
      } else {
        this.loading = false;
        return;
      }
      if (r && r.ok) {
        const p = await r.json();
        window.location.href = '/doday/app/projects/' + p.slug;
      } else {
        this.loading = false;
      }
    },
    async deleteUserTemplate(id) {
      if (!confirm('Удалить этот шаблон?')) return;
      const r = await fetch('/api/user-templates/' + id, {method: 'DELETE', credentials: 'include'});
      if (r.ok) {
        this.userTemplates = this.userTemplates.filter(t => t.id !== id);
        if (this.selectedUserId === id) this.selectedUserId = null;
      }
    },
  }"
  @open-new-project.window="open = true; mode = 'blank'; name = ''; color = 'violet'; selectedKey = null; selectedUserId = null; load()"
  x-show="open"
  x-cloak
  x-transition.opacity
  class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
  @click.self="open = false"
  @keydown.escape.window="open = false"
>
  <div
    x-show="open"
    x-transition.scale.origin.center.duration.200ms
    class="card w-full max-w-2xl max-h-[85vh] overflow-hidden flex flex-col shadow-glow"
  >
    <div class="px-6 py-4 border-b border-[var(--border)] flex items-center justify-between">
      <h2 class="text-xl font-bold">Новый проект</h2>
      <button type="button" @click="open = false" class="p-1 rounded hover:bg-[var(--surface-2)] text-[var(--text-muted)]">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="px-6 pt-4 flex gap-1 border-b border-[var(--border)]">
      <button type="button" @click="mode = 'blank'"
              :class="mode === 'blank' ? 'border-[var(--accent)] text-[var(--accent)] font-semibold' : 'border-transparent text-[var(--text-muted)] hover:text-[var(--text)]'"
              class="px-4 py-2 border-b-2 transition text-sm">Пустой</button>
      <button type="button" @click="mode = 'template'"
              :class="mode === 'template' ? 'border-[var(--accent)] text-[var(--accent)] font-semibold' : 'border-transparent text-[var(--text-muted)] hover:text-[var(--text)]'"
              class="px-4 py-2 border-b-2 transition text-sm">Из шаблона</button>
    </div>

    <div class="flex-1 overflow-y-auto p-6">
      <div x-show="mode === 'blank'" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-[var(--text-muted)] mb-1.5">Название</label>
          <input type="text" x-model="name" @keydown.enter="createBlank()"
                 placeholder="Например: Учёба, Дом, Работа"
                 class="w-full px-4 py-2.5 rounded-lg bg-[var(--surface-2)] border border-[var(--border)] focus:border-[var(--accent)] outline-none transition"
                 x-init="$watch('open', v => v && mode === 'blank' && setTimeout(() => $el.focus(), 100))">
        </div>
        <div>
          <label class="block text-xs font-semibold text-[var(--text-muted)] mb-1.5">Цвет</label>
          <div class="flex flex-wrap gap-2">
            {% for c in ['violet', 'fuchsia', 'rose', 'amber', 'emerald', 'sky', 'indigo', 'cyan', 'slate'] %}
              <button type="button" @click="color = '{{ c }}'"
                      :class="color === '{{ c }}' ? 'ring-2 ring-offset-2 ring-offset-[var(--surface)] ring-{{ c }}-400' : ''"
                      class="w-8 h-8 rounded-lg bg-{{ c }}-500 transition hover:scale-110"></button>
            {% endfor %}
          </div>
        </div>
      </div>

      <div x-show="mode === 'template'" class="space-y-5">
        <template x-if="userTemplates.length">
          <div>
            <div class="text-xs uppercase font-semibold text-[var(--text-muted)] tracking-wider mb-2">Мои сохранённые</div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <template x-for="t in userTemplates" :key="t.id">
                <div :class="selectedUserId === t.id ? 'border-[var(--accent)] bg-[var(--accent)]/5' : 'border-[var(--border)] hover:border-[var(--accent)]'"
                     class="text-left p-4 rounded-xl border-2 transition group cursor-pointer relative"
                     @click="selectedUserId = t.id; selectedKey = null; name = t.name">
                  <button type="button" title="Удалить шаблон"
                          @click.stop="deleteUserTemplate(t.id)"
                          class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 p-1 rounded text-[var(--text-muted)] hover:text-rose-400 hover:bg-rose-500/10 transition">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                  </button>
                  <div class="flex items-center gap-3 mb-2">
                    <span class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0" :class="'bg-' + t.color + '-500/20'">
                      <span class="w-2.5 h-2.5 rounded-full" :class="'bg-' + t.color + '-500'"></span>
                    </span>
                    <div class="flex-1 min-w-0">
                      <div class="font-semibold truncate" x-text="t.name"></div>
                      <div class="text-xs text-[var(--text-muted)]">
                        <span x-text="(t.payload.sections || []).length"></span> секций ·
                        <span x-text="(t.payload.tasks || []).length"></span> задач
                      </div>
                    </div>
                  </div>
                  <p x-show="t.description" class="text-xs text-[var(--text-muted)] line-clamp-2" x-text="t.description"></p>
                </div>
              </template>
            </div>
          </div>
        </template>

        <div>
          <div class="text-xs uppercase font-semibold text-[var(--text-muted)] tracking-wider mb-2">Готовые</div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <template x-for="t in templates" :key="t.key">
              <button type="button" @click="selectedKey = t.key; selectedUserId = null; name = t.name"
                      :class="selectedKey === t.key ? 'border-[var(--accent)] bg-[var(--accent)]/5' : 'border-[var(--border)] hover:border-[var(--accent)]'"
                      class="text-left p-4 rounded-xl border-2 transition group">
                <div class="flex items-center gap-3 mb-2">
                  <span class="text-2xl" x-text="t.icon"></span>
                  <div class="flex-1 min-w-0">
                    <div class="font-semibold truncate" x-text="t.name"></div>
                    <div class="text-xs text-[var(--text-muted)]">
                      <span x-text="t.sections_count"></span> секций · <span x-text="t.tasks_count"></span> задач
                    </div>
                  </div>
                </div>
                <p class="text-xs text-[var(--text-muted)] line-clamp-2" x-text="t.description"></p>
              </button>
            </template>
          </div>
        </div>
      </div>
    </div>

    <div class="px-6 py-4 border-t border-[var(--border)] flex items-center justify-end gap-2">
      <button type="button" @click="open = false" class="px-4 py-2 rounded-lg hover:bg-[var(--surface-2)] transition text-sm">Отмена</button>
      <button type="button" x-show="mode === 'blank'" @click="createBlank()"
              :disabled="loading || !name.trim()"
              :class="loading || !name.trim() ? 'opacity-50 cursor-not-allowed' : ''"
              class="btn-primary px-5 py-2 text-sm">Создать</button>
      <button type="button" x-show="mode === 'template'" @click="createFromTemplate()"
              :disabled="loading || (!selectedKey && !selectedUserId)"
              :class="loading || (!selectedKey && !selectedUserId) ? 'opacity-50 cursor-not-allowed' : ''"
              class="btn-primary px-5 py-2 text-sm">Создать из шаблона</button>
    </div>
  </div>
</div>
