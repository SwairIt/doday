{# Single project row in sidebar — name, color dot, drag-handle, count, context menu. #}
{% set active = view == 'project' and project and project.id == p.id %}
<div data-project-id="{{ p.id }}"
     class="group relative flex items-center gap-2 px-3 py-2 rounded-lg transition
            {% if active %}bg-[var(--surface)] font-semibold{% else %}hover:bg-[var(--surface)]{% endif %}">
  <span data-drag-handle class="cursor-grab active:cursor-grabbing opacity-0 group-hover:opacity-50 hover:opacity-100 text-[var(--text-muted)] -ml-1">
    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/></svg>
  </span>
  <a href="/app/projects/{{ p.slug }}" class="flex items-center gap-2 flex-1 min-w-0">
    <span class="w-2 h-2 rounded-full bg-{{ p.color }}-500 shrink-0"></span>
    <span class="truncate text-sm flex-1 min-w-0">{{ p.name }}</span>
    {% if p.is_favorite %}
      <svg class="w-3 h-3 text-amber-400 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.286 3.957a1 1 0 00.95.69h4.162c.969 0 1.371 1.24.588 1.81l-3.366 2.446a1 1 0 00-.364 1.118l1.287 3.957c.299.921-.755 1.688-1.539 1.118l-3.366-2.446a1 1 0 00-1.176 0l-3.366 2.446c-.783.57-1.838-.197-1.539-1.118l1.287-3.957a1 1 0 00-.364-1.118L2.07 9.384c-.783-.57-.38-1.81.588-1.81h4.162a1 1 0 00.95-.69l1.286-3.957z"/></svg>
    {% endif %}
    <span data-project-count="{{ p.id }}" class="text-[10px] text-[var(--text-muted)] tabular-nums shrink-0"></span>
  </a>

  {% if not p.is_inbox %}
    <div x-data="{ open: false }" class="relative">
      <button type="button"
              @click.stop="open = !open"
              class="opacity-0 group-hover:opacity-100 p-1 rounded hover:bg-[var(--surface-2)] text-[var(--text-muted)] transition"
              :class="open ? 'opacity-100' : ''">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
      </button>
      <div x-show="open" x-cloak @click.outside="open = false" x-transition
           class="absolute right-0 top-full mt-1 z-30 card p-1 w-52 shadow-lg space-y-0.5">
        <button type="button"
                @click="open = false; window.dispatchEvent(new CustomEvent('open-edit-project', {detail: {id: '{{ p.id }}', name: {{ p.name|tojson }}, color: '{{ p.color }}', description: {{ (p.description or '')|tojson }} } }))"
                class="w-full text-left text-sm px-3 py-1.5 rounded hover:bg-[var(--surface-2)] flex items-center gap-2">
          <svg class="w-4 h-4 text-[var(--text-muted)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          Изменить
        </button>
        <button type="button"
                @click="open = false; fetch('/api/projects/{{ p.id }}', {method:'PATCH',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({is_favorite: {{ 'false' if p.is_favorite else 'true' }} })}).then(()=>location.reload())"
                class="w-full text-left text-sm px-3 py-1.5 rounded hover:bg-[var(--surface-2)] flex items-center gap-2">
          <svg class="w-4 h-4 text-amber-400" fill="{% if p.is_favorite %}currentColor{% else %}none{% endif %}" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.286 3.957a1 1 0 00.95.69h4.162c.969 0 1.371 1.24.588 1.81l-3.366 2.446a1 1 0 00-.364 1.118l1.287 3.957c.299.921-.755 1.688-1.539 1.118l-3.366-2.446a1 1 0 00-1.176 0l-3.366 2.446c-.783.57-1.838-.197-1.539-1.118l1.287-3.957a1 1 0 00-.364-1.118L2.07 9.384c-.783-.57-.38-1.81.588-1.81h4.162a1 1 0 00.95-.69l1.286-3.957z"/></svg>
          {% if p.is_favorite %}Убрать из избранного{% else %}В избранное{% endif %}
        </button>
        <button type="button"
                @click="open = false; fetch('/api/projects/{{ p.id }}/duplicate', {method:'POST',credentials:'include'}).then(r=>r.json()).then(p=>{ if(p && p.slug) location.href='/app/projects/'+p.slug; })"
                class="w-full text-left text-sm px-3 py-1.5 rounded hover:bg-[var(--surface-2)] flex items-center gap-2">
          <svg class="w-4 h-4 text-[var(--text-muted)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"/></svg>
          Дублировать
        </button>
        <a href="/api/projects/{{ p.id }}/export.md" download
           @click="open = false"
           class="w-full text-left text-sm px-3 py-1.5 rounded hover:bg-[var(--surface-2)] flex items-center gap-2">
          <svg class="w-4 h-4 text-[var(--text-muted)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5m0 0l5-5m-5 5V4"/></svg>
          Скачать .md
        </a>
        <a href="/api/projects/{{ p.id }}/export.ics" download
           @click="open = false"
           class="w-full text-left text-sm px-3 py-1.5 rounded hover:bg-[var(--surface-2)] flex items-center gap-2">
          <svg class="w-4 h-4 text-[var(--text-muted)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3M3 11h18M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          Скачать .ics (календарь)
        </a>
        <button type="button"
                @click="open = false; fetch('/api/projects/{{ p.id }}', {method:'PATCH',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({is_archived: true})}).then(()=>location.reload())"
                class="w-full text-left text-sm px-3 py-1.5 rounded hover:bg-[var(--surface-2)] flex items-center gap-2">
          <svg class="w-4 h-4 text-[var(--text-muted)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/></svg>
          Архивировать
        </button>
        <hr class="border-[var(--border)] my-1">
        <button type="button"
                @click="open = false; if(confirm('Удалить проект «{{ p.name }}» и все его задачи?')) fetch('/api/projects/{{ p.id }}', {method:'DELETE',credentials:'include'}).then(()=>location.href='/app/today')"
                class="w-full text-left text-sm px-3 py-1.5 rounded hover:bg-rose-500/10 text-rose-400 flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M1 7h22M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3"/></svg>
          Удалить
        </button>
      </div>
    </div>
  {% endif %}
</div>
