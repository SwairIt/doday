{# Right-click context menu on any task row. Listens globally; positions
   itself at cursor; closes on click-outside / Escape. #}
<div id="task-ctx-menu"
     data-me="{{ current_user.id }}"
     style="display: none; position: fixed; z-index: 60;"
     class="card p-1 shadow-glow text-sm min-w-[200px]">
  <button data-ctx="detail" class="ctx-item">📂 Открыть детали</button>
  <button data-ctx="edit" class="ctx-item">✏️ Редактировать</button>
  <button data-ctx="labels" class="ctx-item">🏷 Лейблы</button>
  <button data-ctx="comments" class="ctx-item">💬 Комментарии</button>
  <button data-ctx="duplicate" class="ctx-item">📑 Дублировать</button>
  <button data-ctx="copy-link" class="ctx-item">🔗 Скопировать ссылку</button>
  <hr class="my-1 border-[var(--border)]">
  <button data-ctx="assign-me" class="ctx-item">🙋 Назначить на меня</button>
  <button data-ctx="unassign" class="ctx-item">🙅 Снять назначение</button>
  <hr class="my-1 border-[var(--border)]">
  <button data-ctx="prio-1" class="ctx-item">🔴 Приоритет P1</button>
  <button data-ctx="prio-2" class="ctx-item">🟠 Приоритет P2</button>
  <button data-ctx="prio-3" class="ctx-item">🔵 Приоритет P3</button>
  <button data-ctx="prio-4" class="ctx-item">⚪ Без приоритета</button>
  <hr class="my-1 border-[var(--border)]">
  <button data-ctx="due-today" class="ctx-item">📅 На сегодня</button>
  <button data-ctx="due-tomorrow" class="ctx-item">📅 На завтра</button>
  <button data-ctx="due-week" class="ctx-item">📅 К концу недели</button>
  <button data-ctx="due-weekend" class="ctx-item">📅 На выходные</button>
  <hr class="my-1 border-[var(--border)]">
  <button data-ctx="snooze-1h" class="ctx-item">⏰ Напомнить через 1 час</button>
  <button data-ctx="snooze-3h" class="ctx-item">⏰ Через 3 часа</button>
  <button data-ctx="snooze-morning" class="ctx-item">🌅 Завтра утром (9:00)</button>
  <button data-ctx="due-clear" class="ctx-item">📅 Убрать дату</button>
  <hr class="my-1 border-[var(--border)]">
  <button data-ctx="pin" class="ctx-item">📌 Закрепить / открепить</button>
  <button data-ctx="move" class="ctx-item">📁 Перенести в проект →</button>
  <button data-ctx="delete" class="ctx-item text-rose-400">🗑️ В корзину</button>
</div>
<div id="task-ctx-move-submenu"
     style="display: none; position: fixed; z-index: 61;"
     class="card p-1 shadow-glow text-sm min-w-[200px] max-h-[400px] overflow-y-auto">
  <div class="text-[10px] uppercase tracking-wider text-[var(--text-muted)] px-2 py-1">В какой проект?</div>
  <div id="task-ctx-move-list"></div>
</div>

<style>
  .ctx-item {
    display: block;
    width: 100%;
    text-align: left;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
  }
  .ctx-item:hover { background: var(--surface-2); }
</style>

<script>
  (function() {
    const menu = document.getElementById('task-ctx-menu');
    if (!menu) return;
    const submenu = document.getElementById('task-ctx-move-submenu');
    const submenuList = document.getElementById('task-ctx-move-list');
    let activeTaskId = null;
    let projectsCache = null;
    async function loadProjects() {
      if (projectsCache) return projectsCache;
      try {
        const r = await fetch('/api/projects', {credentials: 'include'});
        if (r.ok) projectsCache = await r.json();
      } catch(e) {}
      return projectsCache || [];
    }
    function hideSubmenu() { submenu.style.display = 'none'; }
    async function showSubmenu(x, y) {
      const projects = await loadProjects();
      submenuList.innerHTML = '';
      for (const p of projects) {
        if (p.is_archived) continue;
        const btn = document.createElement('button');
        btn.className = 'ctx-item flex items-center gap-2';
        btn.dataset.projectId = p.id;
        btn.innerHTML = '<span class="w-2 h-2 rounded-full bg-' + p.color + '-500 shrink-0"></span>'
          + '<span class="truncate">' + (p.name || '').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])) + '</span>';
        submenuList.appendChild(btn);
      }
      submenu.style.display = 'block';
      const rect = submenu.getBoundingClientRect();
      const maxX = window.innerWidth - rect.width - 8;
      const maxY = window.innerHeight - rect.height - 8;
      submenu.style.left = Math.min(x, maxX) + 'px';
      submenu.style.top = Math.min(y, maxY) + 'px';
    }
    submenu.addEventListener('click', async function(e) {
      const btn = e.target.closest('[data-project-id]');
      if (!btn || !activeTaskId) return;
      const targetProject = btn.dataset.projectId;
      hideSubmenu();
      const tid = activeTaskId;
      activeTaskId = null;
      try {
        const r = await fetch('/api/tasks/' + tid, {
          method: 'PATCH', credentials: 'include',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({project_id: targetProject}),
        });
        if (r.ok) location.reload();
      } catch(e) {}
    });

    function todayISO(off) {
      const d = new Date();
      d.setDate(d.getDate() + (off || 0));
      return d.toISOString().slice(0, 10) + 'T23:59:00Z';
    }
    function endOfWeek() {
      const now = new Date();
      const days = (7 - now.getDay()) % 7 || 7;
      const target = new Date(now.getFullYear(), now.getMonth(), now.getDate() + days);
      return target.toISOString().slice(0, 10) + 'T23:59:00Z';
    }
    function nextWeekend() {
      // Next Saturday (or today if today IS Saturday and it's morning).
      const now = new Date();
      const dow = now.getDay();  // 0 = Sun, 6 = Sat
      const daysToSat = dow === 6 ? 0 : (6 - dow + 7) % 7 || 7;
      const target = new Date(now.getFullYear(), now.getMonth(), now.getDate() + daysToSat);
      return target.toISOString().slice(0, 10) + 'T10:00:00Z';
    }
    function snoozeHours(h) {
      const t = new Date(Date.now() + h * 3600 * 1000);
      return t.toISOString().slice(0, 19) + 'Z';
    }
    function tomorrowMorning() {
      const t = new Date();
      t.setDate(t.getDate() + 1);
      t.setHours(9, 0, 0, 0);
      return t.toISOString().slice(0, 19) + 'Z';
    }

    function showAt(x, y) {
      menu.style.display = 'block';
      // Clamp to viewport edges.
      const rect = menu.getBoundingClientRect();
      const maxX = window.innerWidth - rect.width - 8;
      const maxY = window.innerHeight - rect.height - 8;
      menu.style.left = Math.min(x, maxX) + 'px';
      menu.style.top = Math.min(y, maxY) + 'px';
    }
    function hide() { menu.style.display = 'none'; hideSubmenu(); activeTaskId = null; }

    document.addEventListener('contextmenu', function(e) {
      const wrap = e.target.closest('[id^="task-wrap-"]');
      if (!wrap) return;
      e.preventDefault();
      activeTaskId = wrap.id.replace('task-wrap-', '');
      showAt(e.clientX, e.clientY);
    });
    document.addEventListener('click', function(e) {
      if (!menu.contains(e.target) && !submenu.contains(e.target)) hide();
    });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') hide(); });

    menu.addEventListener('click', async function(e) {
      const btn = e.target.closest('[data-ctx]');
      if (!btn || !activeTaskId) return;
      const action = btn.dataset.ctx;
      const tid = activeTaskId;

      if (action === 'move') {
        // Keep activeTaskId; only hide the parent menu, then show submenu next to it.
        const rect = menu.getBoundingClientRect();
        menu.style.display = 'none';
        showSubmenu(rect.right + 4, rect.top);
        return;
      }
      hide();

      const patch = (body) => fetch('/api/tasks/' + tid, {
        method: 'PATCH', credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
      });

      if (action === 'detail') {
        if (window.htmx) htmx.ajax('GET', '/htmx/tasks/' + tid + '/detail', {target: '#task-detail-slot', swap: 'innerHTML'});
        return;
      }
      if (action === 'edit') {
        if (window.htmx) htmx.ajax('GET', '/htmx/tasks/' + tid + '/edit', {target: '#task-' + tid, swap: 'outerHTML'});
        return;
      }
      if (action === 'labels') {
        if (window.htmx) htmx.ajax('GET', '/htmx/tasks/' + tid + '/labels-popover', {target: '#labels-slot-' + tid, swap: 'innerHTML'});
        return;
      }
      if (action === 'comments') {
        const slot = document.getElementById('comments-slot-' + tid);
        if (slot && slot.innerHTML.trim()) {
          slot.innerHTML = '';
        } else if (window.htmx) {
          htmx.ajax('GET', '/htmx/tasks/' + tid + '/comments', {target: '#comments-slot-' + tid, swap: 'innerHTML'});
        }
        return;
      }
      if (action === 'duplicate') {
        await fetch('/api/tasks/' + tid + '/duplicate', {method: 'POST', credentials: 'include'});
        location.reload();
        return;
      }
      if (action === 'copy-link') {
        const url = location.origin + location.pathname + '?task=' + tid;
        try {
          if (navigator.clipboard) await navigator.clipboard.writeText(url);
          if (window.dodayToast) window.dodayToast('Ссылка скопирована', {icon: '🔗'});
        } catch(e) {
          if (window.dodayToast) window.dodayToast('Не удалось скопировать', {icon: '⚠'});
        }
        return;
      }
      if (action === 'assign-me') { await patch({assigned_to: menu.dataset.me}); location.reload(); return; }
      if (action === 'unassign') { await patch({assigned_to: null}); location.reload(); return; }
      if (action.startsWith('prio-')) {
        await patch({priority: 'p' + action.slice(5)});
        location.reload();
        return;
      }
      if (action === 'due-today') { await patch({due_at: todayISO(0), due_date_only: true}); location.reload(); return; }
      if (action === 'due-tomorrow') { await patch({due_at: todayISO(1), due_date_only: true}); location.reload(); return; }
      if (action === 'due-week') { await patch({due_at: endOfWeek(), due_date_only: true}); location.reload(); return; }
      if (action === 'due-weekend') { await patch({due_at: nextWeekend(), due_date_only: true}); location.reload(); return; }
      if (action === 'snooze-1h') { await patch({due_at: snoozeHours(1), due_date_only: false}); location.reload(); return; }
      if (action === 'snooze-3h') { await patch({due_at: snoozeHours(3), due_date_only: false}); location.reload(); return; }
      if (action === 'snooze-morning') { await patch({due_at: tomorrowMorning(), due_date_only: false}); location.reload(); return; }
      if (action === 'due-clear') { await patch({due_at: null}); location.reload(); return; }
      if (action === 'pin') {
        // Try POST (set); ignore 200/duplicate. To unpin, user repeats — service is idempotent on POST.
        const wrap = document.getElementById('task-wrap-' + tid);
        const isPinned = wrap && wrap.querySelector('[title="Закреплено"]');
        await fetch('/api/tasks/' + tid + '/pin', {
          method: isPinned ? 'DELETE' : 'POST', credentials: 'include',
        });
        location.reload();
        return;
      }
      if (action === 'delete') {
        await fetch('/api/tasks/' + tid, {method: 'DELETE', credentials: 'include'});
        const wrap = document.getElementById('task-wrap-' + tid);
        if (wrap) wrap.remove();
        return;
      }
    });

    // Deep-link: open a task's detail panel if the URL carries ?task=<uuid>.
    function openDeepLinkedTask() {
      var tid = new URLSearchParams(location.search).get('task');
      var slot = document.getElementById('task-detail-slot');
      if (tid && /^[0-9a-fA-F-]{36}$/.test(tid) && slot && window.htmx) {
        htmx.ajax('GET', '/htmx/tasks/' + tid + '/detail', {target: '#task-detail-slot', swap: 'innerHTML'});
      }
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', openDeepLinkedTask);
    else openDeepLinkedTask();
  })();
</script>
