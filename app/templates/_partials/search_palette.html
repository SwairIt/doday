{# ⌘K command palette modal. Mounted once globally in app_base.html. #}
<div
  x-data="{
    open: false,
    q: '',
    commands: [
      {label: 'Сегодня', url: '/doday/app/today', icon: '📅'},
      {label: 'Инбокс', url: '/doday/app/inbox', icon: '📥'},
      {label: 'Ближайшие', url: '/doday/app/upcoming', icon: '🗓'},
      {label: 'Календарь', url: '/doday/app/calendar', icon: '📆'},
      {label: 'Команда', url: '/doday/app/team', icon: '👥'},
      {label: 'Назначено мне', url: '/doday/app/assigned', icon: '🙋'},
      {label: 'Активность', url: '/doday/app/activity', icon: '⚡'},
      {label: 'Статистика', url: '/doday/app/stats', icon: '📊'},
      {label: 'Выполненные', url: '/doday/app/done', icon: '✅'},
      {label: 'Лейблы', url: '/doday/app/labels', icon: '🏷'},
      {label: 'Настройки', url: '/doday/app/settings', icon: '⚙'}
    ],
    get matchedCommands() {
      const term = this.q.trim().toLowerCase();
      if (!term) return this.commands;
      return this.commands.filter(c => c.label.toLowerCase().includes(term));
    },
    go(url) { this.open = false; window.location.href = url; },
    init() {
      this.$watch('open', v => { if (v) this.q = ''; });
      document.addEventListener('open-search', () => this.open = true);
      window.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
          e.preventDefault();
          this.open = !this.open;
        }
        if (e.key === 'Escape' && this.open) this.open = false;
      });
    }
  }"
  x-cloak
  x-show="open"
  @click.self="open = false"
  class="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-start justify-center pt-24 px-4"
>
  <div
    x-show="open"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 scale-95 -translate-y-2"
    x-transition:enter-end="opacity-100 scale-100 translate-y-0"
    class="w-full max-w-xl card overflow-hidden shadow-glow"
    @click.stop
  >
    <div class="flex items-center gap-3 px-4 py-3 border-b border-[var(--border)]">
      <svg class="w-5 h-5 text-[var(--text-muted)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/>
      </svg>
      <input
        type="search"
        name="q"
        placeholder="Поиск по задачам и проектам…"
        class="flex-1 bg-transparent border-none outline-none text-base"
        x-ref="input"
        x-show="open"
        x-model="q"
        @keydown.escape="open = false"
        x-init="$watch('open', value => { if (value) $nextTick(() => $refs.input.focus()) })"
        hx-get="/doday/htmx/search"
        hx-trigger="keyup changed delay:200ms"
        hx-target="#search-results"
        hx-swap="innerHTML"
      >
      <kbd class="text-xs px-1.5 py-0.5 rounded bg-[var(--surface-2)] border border-[var(--border)] text-[var(--text-muted)]">Esc</kbd>
    </div>
    {# Quick-navigation commands — palette doubles as a launcher. Filtered live by the query. #}
    <template x-if="matchedCommands.length">
      <div class="border-b border-[var(--border)] py-1.5">
        <div class="px-4 py-1 text-[10px] uppercase tracking-wider font-semibold text-[var(--text-muted)]">Перейти</div>
        <template x-for="c in matchedCommands" :key="c.url">
          <button type="button" @click="go(c.url)"
                  class="w-full flex items-center gap-3 px-4 py-2 text-left text-sm hover:bg-[var(--surface-2)] transition">
            <span class="w-5 text-center" x-text="c.icon"></span>
            <span x-text="c.label"></span>
          </button>
        </template>
      </div>
    </template>
    <div id="search-results" class="max-h-[50vh] overflow-y-auto">
      <div class="px-4 py-8 text-center text-sm text-[var(--text-muted)]">
        Начни печатать чтобы найти что-то.
      </div>
    </div>
  </div>
</div>
