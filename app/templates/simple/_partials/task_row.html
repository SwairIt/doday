<li id="simple-task-{{ task.id }}" class="card p-3 flex items-center gap-3">
  <button hx-post="/app/simple/task/{{ task.id }}/toggle"
          hx-target="#simple-task-{{ task.id }}"
          hx-swap="outerHTML"
          aria-label="{% if task.is_completed %}Восстановить{% else %}Отметить выполненной{% endif %}"
          class="w-6 h-6 rounded-full border-2 border-[var(--accent)] flex-shrink-0 flex items-center justify-center
                 {% if task.is_completed %}grad-bg{% endif %}">
    {% if task.is_completed %}
      <svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    {% endif %}
  </button>
  <span class="flex-1 {% if task.is_completed %}line-through opacity-60{% endif %}">
    {{ task.title }}
  </span>
  <button hx-post="/app/simple/task/{{ task.id }}/delete"
          hx-target="#simple-task-{{ task.id }}"
          hx-swap="outerHTML swap:200ms"
          hx-confirm="Удалить эту задачу?"
          aria-label="Удалить задачу"
          class="text-[var(--text-muted)] hover:text-[var(--danger)] transition flex-shrink-0">
    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M1 7h22M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3"/>
    </svg>
  </button>
</li>
