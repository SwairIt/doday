{% extends "app_base.html" %}
{% block title %}Привычки — Doday{% endblock %}
{% block view_title %}Привычки{% endblock %}
{% block content %}
<div
  x-data="{
    habits: [],
    loading: true,
    showForm: false,
    draftName: '',
    draftEmoji: '✅',
    draftColor: 'violet',
    saving: false,
    emojis: ['✅','💧','🏃','📚','🧘','🛌','🥗','🚭','🪥','🧹','💪','✍️','🎵','🌱','🧠'],
    colors: ['violet','fuchsia','rose','amber','emerald','sky','indigo','cyan'],
    async load() {
      this.loading = true;
      try {
        const r = await fetch('/api/habits', {credentials:'include'});
        if (r.ok) this.habits = await r.json();
      } finally { this.loading = false; }
    },
    init() { this.load(); },
    async create() {
      if (!this.draftName.trim()) return;
      this.saving = true;
      try {
        const r = await fetch('/api/habits', {
          method: 'POST', credentials: 'include',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({name: this.draftName.trim(), emoji: this.draftEmoji, color: this.draftColor}),
        });
        if (r.ok) {
          this.draftName = ''; this.draftEmoji = '✅'; this.draftColor = 'violet';
          this.showForm = false; await this.load();
        }
      } finally { this.saving = false; }
    },
    async toggle(h) {
      const url = '/api/habits/' + h.id + '/checkin';
      const method = h.today_done ? 'DELETE' : 'POST';
      const r = await fetch(url, {method, credentials: 'include'});
      if (r.ok) {
        const stats = await r.json();
        h.today_done = stats.today_done;
        h.current_streak = stats.current_streak;
        h.longest_streak = stats.longest_streak;
        h.last_30 = stats.last_30;
      }
    },
    async archive(h) {
      if (!confirm('Архивировать привычку «'+h.name+'»? Историю не потеряешь, но из списка пропадёт.')) return;
      const r = await fetch('/api/habits/' + h.id, {method: 'DELETE', credentials: 'include'});
      if (r.status === 204) await this.load();
    },
  }"
>
  <div class="mb-8 flex items-start gap-4">
    <div class="flex-1 min-w-0">
      <h1 class="text-3xl md:text-4xl font-bold mb-1">Привычки</h1>
      <p class="text-[var(--text-muted)] text-sm">
        Каждый день кликай по кружку — таймер серии копит. Пропустил — серия сбросится.
      </p>
    </div>
    <button @click="showForm = !showForm" class="btn-primary px-4 py-2 text-sm">
      <span x-text="showForm ? 'Скрыть' : '+ Добавить'"></span>
    </button>
  </div>

  <div x-show="showForm" x-cloak x-transition class="card p-4 mb-6 space-y-3">
    <div>
      <label class="block text-xs text-[var(--text-muted)] mb-1">Название</label>
      <input x-model="draftName" maxlength="60" placeholder="Выпить стакан воды утром"
             class="w-full px-3 py-2 text-sm rounded-lg bg-[var(--surface-2)] border border-[var(--border)] outline-none focus:border-[var(--accent)]">
    </div>
    <div>
      <label class="block text-xs text-[var(--text-muted)] mb-1">Иконка</label>
      <div class="flex flex-wrap gap-1.5">
        <template x-for="e in emojis" :key="e">
          <button type="button" @click="draftEmoji = e"
                  :class="draftEmoji === e ? 'border-[var(--accent)] bg-[var(--accent)]/10' : 'border-[var(--border)]'"
                  class="w-9 h-9 rounded-lg border-2 transition" x-text="e"></button>
        </template>
      </div>
    </div>
    <div>
      <label class="block text-xs text-[var(--text-muted)] mb-1">Цвет</label>
      <div class="flex flex-wrap gap-1.5">
        <template x-for="c in colors" :key="c">
          <button type="button" @click="draftColor = c"
                  :class="draftColor === c ? 'ring-2 ring-[var(--accent)]' : ''"
                  :style="`background: var(--c-${c}, currentColor)`"
                  :class.dynamic="`bg-${c}-500`"
                  class="w-9 h-9 rounded-lg transition">
            <span :class="`block w-full h-full rounded-lg bg-${c}-500`"></span>
          </button>
        </template>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button @click="create()" :disabled="saving || !draftName.trim()" class="btn-primary px-4 py-2 text-sm">
        <span x-text="saving ? 'Создаю…' : 'Создать'"></span>
      </button>
      <button @click="showForm = false" class="btn-ghost px-3 py-2 text-sm">Отмена</button>
    </div>
  </div>

  <template x-if="loading">
    <div class="card p-8 text-center text-[var(--text-muted)] text-sm">Загружаю…</div>
  </template>

  <template x-if="!loading && !habits.length && !showForm">
    <div class="card p-12 text-center">
      <div class="text-5xl mb-3">🌱</div>
      <h2 class="text-xl font-semibold mb-1">Пока нет привычек</h2>
      <p class="text-[var(--text-muted)] text-sm mb-4">Начни с одной маленькой — например, «выпить стакан воды утром».</p>
      <button @click="showForm = true" class="btn-primary px-4 py-2 text-sm">+ Создать привычку</button>
    </div>
  </template>

  <div class="space-y-2">
    <template x-for="h in habits" :key="h.id">
      <div class="card p-4 flex items-center gap-4">
        <button @click="toggle(h)"
                :class="h.today_done ? 'grad-bg shadow-glow' : 'bg-[var(--surface-2)] border-2 border-[var(--border)]'"
                class="w-12 h-12 rounded-2xl flex items-center justify-center text-2xl shrink-0 transition active:scale-95">
          <span x-text="h.emoji"></span>
        </button>
        <div class="flex-1 min-w-0">
          <div class="font-semibold truncate" x-text="h.name"></div>
          <div class="text-xs text-[var(--text-muted)] flex items-center gap-3">
            <span x-show="h.current_streak > 0">🔥 <span class="text-orange-400 font-medium" x-text="h.current_streak"></span> подряд</span>
            <span x-show="h.longest_streak > h.current_streak">рекорд: <span x-text="h.longest_streak"></span></span>
            <span x-show="h.today_done" class="text-emerald-400">✓ сегодня</span>
          </div>
        </div>
        {# 30-day grid (newest left) #}
        <div class="hidden md:flex items-center gap-0.5 shrink-0">
          <template x-for="(done, idx) in h.last_30.slice(0, 14)" :key="idx">
            <span :class="done ? 'bg-emerald-400' : 'bg-[var(--border)]'"
                  class="w-2 h-2 rounded-sm"
                  :title="done ? 'отмечено' : 'не отмечено'"></span>
          </template>
        </div>
        <button @click="archive(h)" class="text-[var(--text-muted)] hover:text-rose-400 text-xs px-2 shrink-0">×</button>
      </div>
    </template>
  </div>
</div>
{% endblock %}
