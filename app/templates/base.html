<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>{% block title %}Doday — твой свободный туду-лист{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: ['class', '[data-theme="dark"]'],
        theme: {
          extend: {
            colors: {
              brand: {
                50:  '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff', 300: '#d8b4fe',
                400: '#c084fc', 500: '#a855f7', 600: '#9333ea', 700: '#7c3aed',
                800: '#6b21a8', 900: '#4c1d95', 950: '#2e1065'
              },
              ink: {
                50:  '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd',
                400: '#9890b8', 500: '#6b6587', 700: '#4a4170', 900: '#1a1230', 950: '#0d0820'
              },
              accent: {
                grad1: '#7c3aed',
                grad2: '#d946ef'
              }
            },
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif']
            },
            boxShadow: {
              glow: '0 0 60px -20px rgba(124,58,237,0.45)',
              card: '0 16px 40px -8px rgba(124,58,237,0.18)'
            },
            animation: {
              'fade-in':  'fadeIn 200ms ease-out',
              'slide-up': 'slideUp 240ms cubic-bezier(0.16, 1, 0.3, 1)',
              'pop-in':   'popIn 280ms cubic-bezier(0.16, 1, 0.3, 1)'
            },
            keyframes: {
              fadeIn:  { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              slideUp: { '0%': { transform: 'translateY(8px)',  opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
              popIn:   { '0%': { transform: 'scale(0.96)',      opacity: '0' }, '100%': { transform: 'scale(1)',     opacity: '1' } }
            }
          }
        }
      }
    </script>

    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.7/dist/cdn.min.js"></script>

    <script>
      (function() {
        try {
          var saved = localStorage.getItem('doday-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

    <style>
      :root {
        --bg: #fafaff;
        --surface: #ffffff;
        --surface-2: #f5f3ff;
        --border: #e9e5f6;
        --text: #1a1230;
        --text-muted: #6b6587;
        --accent: #7c3aed;
        --accent-2: #a855f7;
        --grad-from: #7c3aed;
        --grad-to: #d946ef;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --shadow-sm: 0 1px 2px rgba(31,16,56,0.04);
        --shadow:    0 4px 12px -2px rgba(31,16,56,0.08);
        --shadow-lg: 0 16px 40px -8px rgba(124,58,237,0.18);
        --shadow-glow: 0 0 60px -20px rgba(124,58,237,0.45);
      }
      [data-theme="dark"] {
        --bg: #0d0820;
        --surface: #161028;
        --surface-2: #1f1638;
        --border: #2a2048;
        --text: #f5f3ff;
        --text-muted: #9890b8;
        --accent: #a78bfa;
        --accent-2: #c4b5fd;
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
        --shadow:    0 6px 20px -4px rgba(0,0,0,0.5);
        --shadow-lg: 0 24px 60px -12px rgba(124,58,237,0.35);
        --shadow-glow: 0 0 80px -20px rgba(167,139,250,0.55);
      }

      html { color-scheme: dark light; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: 'cv11', 'ss01';
        min-height: 100vh;
      }

      /* Ambient gradient orbs in the background */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(900px 700px at 100% -10%, rgba(168,85,247,0.18), transparent 60%),
          radial-gradient(1000px 800px at -10% 110%, rgba(217,70,239,0.14), transparent 60%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(900px 700px at 100% -10%, rgba(168,85,247,0.10), transparent 60%),
          radial-gradient(1000px 800px at -10% 110%, rgba(217,70,239,0.08), transparent 60%);
      }
      main, header, nav, footer { position: relative; z-index: 1; }

      .glass {
        background: color-mix(in oklab, var(--surface) 72%, transparent);
        backdrop-filter: saturate(180%) blur(14px);
        -webkit-backdrop-filter: saturate(180%) blur(14px);
        border: 1px solid color-mix(in oklab, var(--border) 70%, transparent);
      }

      .grad-text {
        background: linear-gradient(135deg, var(--grad-from) 0%, var(--grad-to) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .grad-bg {
        background: linear-gradient(135deg, var(--grad-from) 0%, var(--grad-to) 100%);
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: linear-gradient(135deg, var(--grad-from) 0%, var(--grad-to) 100%);
        color: #ffffff;
        font-weight: 600;
        padding: 11px 20px;
        border-radius: 12px;
        box-shadow: var(--shadow-lg);
        transition: transform 150ms ease-out, box-shadow 200ms ease-out, filter 150ms;
        cursor: pointer;
        border: none;
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: var(--shadow-glow), var(--shadow-lg);
        filter: brightness(1.06);
      }
      .btn-primary:active { transform: scale(0.97); }

      .btn-ghost {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: var(--surface);
        color: var(--text);
        font-weight: 500;
        padding: 11px 20px;
        border-radius: 12px;
        border: 1px solid var(--border);
        transition: background 150ms, transform 90ms, border-color 150ms;
        cursor: pointer;
      }
      .btn-ghost:hover { background: var(--surface-2); border-color: color-mix(in oklab, var(--accent) 30%, var(--border)); }
      .btn-ghost:active { transform: scale(0.97); }

      .input {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        width: 100%;
        font: inherit;
        transition: border-color 150ms, box-shadow 150ms, background 150ms;
      }
      .input::placeholder { color: var(--text-muted); }
      .input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 18%, transparent);
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow-sm);
      }

      a { color: var(--accent); }
      a:hover { color: var(--accent-2); }

      /* Selection */
      ::selection { background: color-mix(in oklab, var(--accent) 35%, transparent); color: var(--text); }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: color-mix(in oklab, var(--accent) 50%, var(--border)); }
    </style>
</head>
<body>
    {% block layout %}
      <main class="max-w-2xl mx-auto p-6 animate-fade-in">
        {% block content %}{% endblock %}
      </main>
    {% endblock %}
</body>
</html>
