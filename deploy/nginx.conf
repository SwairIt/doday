# /etc/nginx/sites-available/doday — symlink into sites-enabled.
# After certbot --nginx -d doday.ru -d www.doday.ru runs, it edits this file
# in-place to add SSL blocks. Below is the pre-cert version.

# Trim the Server: header so we don't advertise nginx version.
server_tokens off;

# Hard limit: tasks/comments allow up to 5 KB body, so 1 MB is generous.
client_max_body_size 1m;

# www.doday.ru → doday.ru (canonical apex)
server {
    listen 80;
    listen [::]:80;
    server_name www.doday.ru;
    return 301 https://doday.ru$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name doday.ru;

    # Let's Encrypt webroot challenge (used by `certbot --nginx`)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # After running certbot --nginx, all traffic redirects here to HTTPS.
    # Until then, the app is reachable on HTTP for the initial smoke-test.

    location = /favicon.ico { return 204; access_log off; log_not_found off; }
    location = /robots.txt  { proxy_pass http://127.0.0.1:9100/robots.txt; access_log off; }

    # Static manifest + service worker — the app serves them itself but tag
    # them so nginx can long-cache.
    location = /manifest.webmanifest {
        proxy_pass http://127.0.0.1:9100;
        add_header Cache-Control "public, max-age=3600";
    }
    location = /service-worker.js {
        proxy_pass http://127.0.0.1:9100;
        add_header Cache-Control "no-cache";
    }

    location / {
        proxy_pass http://127.0.0.1:9100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_redirect off;
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Security headers — survive certbot's edits because they're set on
        # the proxied response, not the SSL block.
        add_header X-Frame-Options          "DENY"             always;
        add_header X-Content-Type-Options   "nosniff"          always;
        add_header Referrer-Policy          "same-origin"      always;
        add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
        # CSP is intentionally permissive: HTMX/Alpine/Tailwind run inline-attached
        # to elements, so 'unsafe-inline' for scripts is required. Tighten later.
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    }

    # Compress text-y responses; HTML is dynamic so don't cache, just gzip.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    access_log /var/log/nginx/doday.access.log;
    error_log  /var/log/nginx/doday.error.log warn;
}
